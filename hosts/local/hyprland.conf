monitor=DP-1,highrr,0x0,1,vrr,1
monitor=DP-2,highrr,2660x0,1,vrr,1
# monitor=DP-2,disable

workspace=1,monitor:DP-2
workspace=2,monitor:DP-1
workspace=3,monitor:DP-1
workspace=4,monitor:DP-1
workspace=5,monitor:DP-1
workspace=6,monitor:DP-1
workspace=7,monitor:DP-1
workspace=8,monitor:DP-1
workspace=9,monitor:DP-1

env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,rose-pine-hyprcursor

# Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Native wayland for Electron/CEF apps
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Video acceleration
env = NVD_BACKEND,direct

# env = XDG_SESSION_TYPE,wayland
# env = GBM_BACKEND,nvidia-drm

# env = NVD_BACKEND,direct
# env = WLR_NO_HARDWARE_CURSORS,1

# G-Sync
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1

# Tearing
# env = WLR_DRM_NO_ATOMIC,1
#env = AQ_NO_ATOMIC,1
#windowrulev2 = immediate, xwayland:1
#windowrulev2 = immediate, fullscreen:1
# windowrulev2 = stayfocused, title:App
windowrulev2 = renderunfocused, title:REPO
# windowrulev2 = float, title:App
# windowrulev2 = size 2560 1440, title:App
# windowrulev2 = focusonactivate, title:App

input {
    kb_layout = us,ru
    kb_options = grp:rctrl_rshift_toggle
    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
    force_no_accel = true
    repeat_delay = 250
}

cursor {
    # Creates stutters on fullscreen wayland apps
    no_break_fs_vrr = 1
    inactive_timeout = 3
}

render {
    direct_scanout = true
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    col.active_border = rgba(5f7fafbb)
    col.inactive_border = rgba(3f3f3fbb)
    layout = dwindle
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    disable_hyprland_logo = true
    background_color = rgb(1f1f1f)
    vrr = 1
    middle_click_paste = false
    enable_anr_dialog = false
}

binds {
    disable_keybind_grabbing = true
}

debug {
    #overlay = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

bind = SUPER, X, exec, grimblast copysave active
bind = SUPER SHIFT, X, exec, grimblast copy area
bind = SUPER CTRL, X, exec, grimblast save area - | tesseract -l eng+rus --oem 1 - - | wl-copy
bind = SUPER, P, killactive, 
bind = SUPER SHIFT, P, exec, kill -9 $(hyprctl activewindow | awk '/pid:/ {print $2}') 

bind = SUPER, V, fullscreenstate, 0 0
bind = SUPER, V, settiled 

bind = SUPER, K, fullscreenstate, 0 0
bind = SUPER, K, setfloating 
bind = SUPER, K, resizeactive, exact 100% 100%
bind = SUPER, K, moveactive, exact 0 0 

bind = SUPER, F, fullscreenstate, 3 3

bind = SUPER, Q, exec, wofi --show run
bind = SUPER, W, exec, wofi --show run
# bind = SUPER, Q, exec, kitty --name launcher ~/wg/runner.sh
# bind = SUPER, Q, exec, kitty fzf
bind = SUPER, Z, togglesplit, # dwindle

bind = SUPER, N, exec, kitty fish -c $EDITOR
bind = SUPER SHIFT, N, exec, kitty

# Move focus with mainMod + arrow keys
bind = SUPER, LEFT , movefocus, l
bind = SUPER, RIGHT, movefocus, r
bind = SUPER, UP   , movefocus, u
bind = SUPER, DOWN , movefocus, d

bind = SUPER SHIFT, LEFT , movewindow, l
bind = SUPER SHIFT, RIGHT, movewindow, r
bind = SUPER SHIFT, UP   , movewindow, u
bind = SUPER SHIFT, DOWN , movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, B, workspace, 1
bind = SUPER, M, workspace, 2
bind = SUPER, R, workspace, 3
bind = SUPER, S, workspace, 4
bind = SUPER, T, workspace, 5
bind = SUPER, H, workspace, 6
bind = SUPER, C, workspace, 7
bind = SUPER, D, workspace, 8
bind = SUPER, L, workspace, 9

bind = SUPER, SPACE, fullscreenstate, 0 0
bind = SUPER, SPACE, settiled 
bind = SUPER, SPACE, swapwindow, r
bind = SUPER, SPACE, movefocus, l
bind = SUPER, SPACE, fullscreenstate, 3 3

bind = SUPER SHIFT, B, movetoworkspace, 1
bind = SUPER SHIFT, M, movetoworkspace, 2
bind = SUPER SHIFT, R, movetoworkspace, 3
bind = SUPER SHIFT, S, movetoworkspace, 4
bind = SUPER SHIFT, T, movetoworkspace, 5
bind = SUPER SHIFT, H, movetoworkspace, 6
bind = SUPER SHIFT, C, movetoworkspace, 7
bind = SUPER SHIFT, D, movetoworkspace, 8
bind = SUPER SHIFT, L, movetoworkspace, 9

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Move active window to a workspace with mainMod + SHIFT + [0-9]

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

